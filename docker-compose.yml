services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trivia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD en tu .env}
      POSTGRES_DB: ${POSTGRES_DB:-trivia}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trivia}"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-trivia}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-trivia}
      AUTH_MODE: local
      # Claves obligatorias: el backend aborta el arranque si quedan en un
      # valor por defecto inseguro. Genera una con:
      #   python -c "import secrets; print(secrets.token_urlsafe(48))"
      SECRET_KEY: ${SECRET_KEY:?define SECRET_KEY en tu .env}
      JWT_SECRET: ${JWT_SECRET:?define JWT_SECRET en tu .env}
      SEED_ON_START: "1"
      SEED_DEFAULT_PASSWORD: ${SEED_DEFAULT_PASSWORD:-}
      # Orígenes permitidos del front (separados por coma). Evita "*" en prod.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      RATELIMIT_STORAGE_URI: ${RATELIMIT_STORAGE_URI:-memory://}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
