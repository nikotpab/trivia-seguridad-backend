services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trivia
      POSTGRES_PASSWORD: trivia
      POSTGRES_DB: trivia
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trivia"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://trivia:trivia@db:5432/trivia
      AUTH_MODE: local
      SECRET_KEY: dev-secret-cambiar
      JWT_SECRET: dev-jwt-cambiar
      SEED_ON_START: "1"
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
